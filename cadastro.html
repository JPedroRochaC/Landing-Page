<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logo.png" />
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/button.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Solicitar plano</title>
</head>
<body>
    <form id="signupForm">

    <h1>Solicitar plano</h1>
    <p class="form-subtitle">Coloque aqui os dados do seu salão pra já começarmos a personalização assim que o pagamento for confirmado.</p>

    <input id="salao" type="text" placeholder="Nome do salão" required>

    <input id="nome" type="text" placeholder="Seu nome" required>

    <input id="email" type="email" placeholder="Email" required>

    <input id="whatsapp" type="tel" placeholder="WhatsApp" required>

    <button type="submit" id="submitBtn">
        Continuar para pagamento
    </button>

</form>

<script src="js/cadastro.js"></script>
</body>
</html>
